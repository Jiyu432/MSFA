# general settings
name: train_RGT_x4_P64_DF2K_B8G4_tain
model_type: RGTModel
scale: 4
num_gpu: 2
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /tmp/pycharm_project_ATD2/datasets/trainUcM
    dataroot_lq: /tmp/pycharm_project_ATD2/datasets/trainUcMx4
#    filename_tmpl: '{}x4'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: True
    use_rot: True

    # data loader
    use_shuffle: True
    num_worker_per_gpu: 8
    batch_size_per_gpu: 5
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    task: SR
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /tmp/pycharm_project_ATD2/datasets/yanzhengUcM
    dataroot_lq: /tmp/pycharm_project_ATD2/datasets/yanzhengUcMX4
#    filename_tmpl: '{}x4'
    io_backend:
      type: disk

# network structures
network_g:
  type: RGT
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  depth: [6,6,6,6,6,6,6,6]
  embed_dim: 180
  num_heads: [6,6,6,6,6,6,6,6]
  mlp_ratio: 2
  resi_connection: '1conv'
  split_size: [8,32]
  c_ratio: 0.5

# path
path:
  pretrain_network_g: /RGT2/experiments/train_RGT_x4_P64_DF2K_B8G4_tain_archived_20250702_083908/models/net_g_40000.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [10000,15000, 100000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 2.5e3
  save_img: False

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: True
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2.5e3
  use_tb_logger: True
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500